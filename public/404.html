<!doctype html>
<html lang="zh-CN">
  <head>

    <link rel="icon" type="image/png" href="/favicon-32.png" />

    <style>
      .notfound-page {
        max-width: 480px;
        margin: 0 auto;

      }
      .notfound-mascot {
        width: 120px;
        height: 120px;

      .notfound-page p {

        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
      }
      .notfound-home,
      .notfound-back,
      .notfound-contact {
        display: inline-block;
        padding: 12px 28px;
        border-radius: 999px;
        text-decoration: none;
        font-weight: 500;
        border: 1px solid transparent;
      }
      .notfound-home {
        background: var(--accent);
        color: white;
      }
      .notfound-back,
      .notfound-contact {
        background: transparent;
        color: var(--text-h);
